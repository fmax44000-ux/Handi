<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Veg Hotel - Mobile Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(180deg, #1a1a1a 0%, #2d1f1f 100%);
            color: #fff;
            min-height: 100vh;
            padding: 15px;
        }

        /* Header Section */
        .header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9rem;
            color: #fff;
            opacity: 0.9;
        }

        /* Category Title */
        .category-title {
            text-align: center;
            font-size: 1.5rem;
            color: #ff6b35;
            margin: 25px 0 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Menu Grid */
        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 100%;
        }

        /* Card Design */
        .card {
            background: linear-gradient(145deg, #2a2a2a, #1f1f1f);
            border-radius: 15px;
            padding: 15px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 107, 53, 0.15);
            touch-action: pan-x pan-y;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-content {
            transform: translateZ(20px);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
            text-transform: capitalize;
            line-height: 1.3;
        }

        .card .description {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .price-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            transform: translateZ(15px);
        }

        .price {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ff6b35;
        }

        .price span {
            font-size: 0.8rem;
            color: #888;
            font-weight: 400;
        }

        /* WhatsApp Button */
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transform: translateZ(25px);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .btn:active {
            transform: translateZ(25px) scale(0.98);
        }

        .btn:hover {
            background: linear-gradient(135deg, #128C7E, #075E54);
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        /* Badges */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b35;
            color: #fff;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.65rem;
            font-weight: 700;
            transform: translateZ(30px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }

        .footer p {
            margin-bottom: 5px;
        }

        /* Floating WhatsApp Button */
        .floating-wa {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            text-decoration: none;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 3px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.5s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.15s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.25s; }
        .card:nth-child(5) { animation-delay: 0.3s; }
        .card:nth-child(6) { animation-delay: 0.35s; }
        .card:nth-child(7) { animation-delay: 0.4s; }
        .card:nth-child(8) { animation-delay: 0.45s; }
        .card:nth-child(9) { animation-delay: 0.5s; }
        .card:nth-child(10) { animation-delay: 0.55s; }
        .card:nth-child(11) { animation-delay: 0.6s; }
        .card:nth-child(12) { animation-delay: 0.65s; }
        .card:nth-child(13) { animation-delay: 0.7s; }
        .card:nth-child(14) { animation-delay: 0.75s; }
        .card:nth-child(15) { animation-delay: 0.8s; }
        .card:nth-child(16) { animation-delay: 0.85s; }
        .card:nth-child(17) { animation-delay: 0.9s; }
        .card:nth-child(18) { animation-delay: 0.95s; }

        .card:nth-child(29) { animation-delay: 1.5s; }

        .card:nth-child(50) { animation-delay: 2.55s; }

        /* Loading Screen */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #ff6b35;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ff6b35;
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>
